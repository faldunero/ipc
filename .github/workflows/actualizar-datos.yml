name: 🔄 Actualizar Datos Macroeconómicos IPC

on:
  schedule:
    # Lunes a las 09:00 UTC (04:00 Chile)
    - cron: '0 9 * * 1'
  
  # Para ejecutar manualmente desde GitHub UI
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4
      
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas statsmodels
      
      - name: 🚀 Actualizar datos macro
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python3 actualizar_datos_macro.py
      
      - name: 💾 Guardar cambios en repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "🤖 GitHub Action"
          git add cache_datos_macro.json logs/actualizacion.log 2>/dev/null || true
          git commit -m "🔄 Actualización automática de datos macro ($(date +'%Y-%m-%d %H:%M UTC'))" || echo "✅ Sin cambios"
          git push
